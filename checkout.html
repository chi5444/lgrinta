<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>إتمام الطلب — Lgrinta</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&family=Bebas+Neue&display=swap" rel="stylesheet"/>
  <style>
    :root{--gold:#D4AF37;--gold-dim:rgba(212,175,55,0.15);--bg:#070709;--bg2:#0d0d10;--surface:#15151e;--surface2:#1c1c28;--border:rgba(212,175,55,0.18);--text:#e8e8f0;--text-muted:#7a7a90;--text-dim:#50505f;--red:#ff3b5c;--green:#25D366;--radius:12px;--radius-lg:18px;}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

    nav{position:fixed;top:0;left:0;right:0;z-index:100;height:60px;padding:0 16px;display:flex;align-items:center;justify-content:space-between;background:rgba(7,7,9,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}
    .nav-logo{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:3px;color:var(--gold);text-decoration:none;}
    .nav-back{display:flex;align-items:center;gap:6px;color:var(--text-muted);text-decoration:none;font-size:13px;font-weight:600;background:var(--surface2);border:1px solid var(--border);padding:8px 14px;border-radius:10px;}
    .nav-back:hover{color:var(--gold);}

    .page-wrap{padding:76px 16px 40px;max-width:800px;margin:0 auto;}
    .page-title-section{margin-bottom:28px;}
    .section-label{font-size:11px;letter-spacing:2px;color:var(--gold);text-transform:uppercase;font-weight:700;margin-bottom:6px;}
    .page-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(36px,8vw,52px);letter-spacing:1px;color:var(--text);}
    .divider{width:50px;height:2px;background:linear-gradient(90deg,var(--gold),transparent);margin-top:8px;}

    /* ORDER SUMMARY TOP (mobile) */
    .order-summary-top{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;margin-bottom:20px;}
    .summary-title{font-size:14px;font-weight:800;margin-bottom:14px;color:var(--gold);}
    .summary-item{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.05);align-items:center;}
    .summary-item:last-of-type{border-bottom:none;}
    .summary-item-icon{font-size:22px;flex-shrink:0;}
    .summary-item-info{flex:1;min-width:0;}
    .summary-item-name{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .summary-item-sub{font-size:11px;color:var(--text-muted);}
    .summary-item-price{font-size:14px;font-weight:800;color:var(--gold);white-space:nowrap;}
    .summary-total-row{display:flex;justify-content:space-between;align-items:center;margin-top:14px;padding-top:14px;border-top:1px solid var(--border);}
    .summary-total-label{font-size:14px;color:var(--text-muted);}
    .summary-total-value{font-size:24px;font-weight:900;color:var(--gold);}

    /* FORM */
    .form-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px;margin-bottom:16px;}
    .form-card-title{font-size:14px;font-weight:800;margin-bottom:16px;display:flex;align-items:center;gap:8px;}
    .form-group{margin-bottom:14px;}
    .form-group:last-child{margin-bottom:0;}
    .form-label{font-size:12px;font-weight:700;color:var(--text-muted);letter-spacing:.5px;margin-bottom:7px;display:block;}
    .form-input,.form-select,.form-textarea{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:10px;padding:13px 14px;font-family:'Tajawal',sans-serif;font-size:16px;outline:none;transition:border-color .2s;-webkit-appearance:none;}
    .form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--gold);}
    .form-input::placeholder{color:var(--text-dim);}
    .form-select option{background:var(--surface2);}
    .form-textarea{resize:vertical;min-height:72px;}

    /* PAYMENT METHODS */
    .payment-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
    .payment-option{position:relative;}
    .payment-option input{position:absolute;opacity:0;width:0;height:0;}
    .payment-label{display:flex;flex-direction:column;align-items:center;gap:6px;background:var(--surface2);border:2px solid transparent;border-radius:12px;padding:14px 8px;cursor:pointer;transition:all .2s;text-align:center;-webkit-tap-highlight-color:transparent;}
    .payment-option input:checked + .payment-label{border-color:var(--gold);background:var(--gold-dim);}
    .payment-icon{font-size:22px;}
    .payment-name{font-size:11px;font-weight:700;color:var(--text);}

    /* PLACE ORDER BUTTON */
    .btn-place-order{
      width:100%;background:linear-gradient(135deg,var(--gold),#b8960c);
      color:#000;border:none;padding:16px;border-radius:16px;
      font-size:18px;font-weight:800;cursor:pointer;
      font-family:'Tajawal',sans-serif;transition:all .2s;
      box-shadow:0 4px 24px rgba(212,175,55,.25);margin-top:4px;
    }
    .btn-place-order:hover{transform:translateY(-1px);box-shadow:0 8px 32px rgba(212,175,55,.4);}
    .btn-place-order:disabled{opacity:.6;cursor:not-allowed;transform:none;}
    .security-note{text-align:center;font-size:12px;color:var(--text-dim);margin-top:12px;}

    .error-msg{background:rgba(255,59,92,.1);border:1px solid rgba(255,59,92,.3);color:var(--red);padding:12px 16px;border-radius:10px;font-size:13px;margin-bottom:12px;display:none;}
    .error-msg.show{display:block;}

    .empty-cart-msg{text-align:center;padding:80px 20px;color:var(--text-muted);}
    .empty-cart-icon{font-size:64px;opacity:.3;margin-bottom:16px;}
    .btn-shop{display:inline-flex;align-items:center;gap:8px;background:var(--gold-dim);border:1px solid var(--border);color:var(--gold);padding:12px 24px;border-radius:12px;text-decoration:none;font-weight:700;margin-top:16px;}

    /* SUCCESS OVERLAY */
    .success-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:500;align-items:center;justify-content:center;backdrop-filter:blur(12px);padding:20px;}
    .success-overlay.show{display:flex;}
    .success-card{background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:40px 28px;text-align:center;max-width:400px;width:100%;}
    .success-emoji{font-size:64px;margin-bottom:12px;}
    .success-title{font-family:'Bebas Neue',sans-serif;font-size:36px;color:var(--gold);letter-spacing:2px;margin-bottom:10px;}
    .success-text{font-size:14px;color:var(--text-muted);line-height:1.7;margin-bottom:24px;}
    .btn-success{background:linear-gradient(135deg,var(--gold),#b8960c);color:#000;border:none;padding:14px 32px;border-radius:12px;font-size:16px;font-weight:800;cursor:pointer;font-family:'Tajawal',sans-serif;width:100%;}

    @media(min-width:768px){
      nav{height:70px;padding:0 40px;}
      .page-wrap{padding:90px 40px 60px;}
      .payment-grid{grid-template-columns:repeat(6,1fr);}
    }

    /* ── ICON SIZES ── */
    .ic{width:16px !important;height:16px !important;min-width:16px;min-height:16px;display:inline-block;vertical-align:middle;flex-shrink:0;overflow:hidden;}.ic-sm{width:14px !important;height:14px !important;display:inline-block;vertical-align:middle;}.ic-check,.ic-x{width:14px !important;height:14px !important;}
    .ic-sm{width:14px;height:14px;display:inline-block;vertical-align:middle;flex-shrink:0;}
    .ic-lg{width:20px;height:20px;display:inline-block;vertical-align:middle;flex-shrink:0;}
    svg.ic,svg.ic-sm,svg.ic-lg{display:inline-block;}

    .payment-icon-text{
      font-family:'Inter','Tajawal',sans-serif;
      font-size:11px;font-weight:900;letter-spacing:.5px;
      color:var(--gold);background:var(--gold-dim);
      border:1px solid var(--border);
      padding:3px 6px;border-radius:5px;
      display:block;text-align:center;
    }
  </style>
</head>
<body>
<nav>
  <a href="index.html" style="display:flex;align-items:center;gap:8px;text-decoration:none"><img src="img.png" alt="Lgrinta" style="height:38px;width:38px;object-fit:contain;filter:drop-shadow(0 2px 8px rgba(212,175,55,.4))"/><span style="font-family:Bebas Neue,sans-serif;font-size:22px;letter-spacing:3px;color:#D4AF37">LGRINTA</span></a>
  <a href="index.html" class="nav-back">← المتجر</a>
</nav>

<div class="page-wrap">
  <div class="page-title-section">
    <div class="section-label">الخطوة الأخيرة</div>
    <h1 class="page-title">إتمام الطلب</h1>
    <div class="divider"></div>
  </div>
  <div id="main-content"></div>
</div>

<div class="success-overlay" id="success-overlay">
  <div class="success-card">
    <div class="success-emoji"><svg width="15" height="15" style="flex-shrink:0;display:inline-block;vertical-align:middle" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="14.5 17.5 3 6 3 3 6 3 17.5 14.5"/><line x1="13" y1="19" x2="19" y2="13"/><line x1="16" y1="16" x2="20" y2="20"/><line x1="19" y1="21" x2="21" y2="19"/></svg></div>
    <h2 class="success-title">تم الطلب!</h2>
    <p class="success-text">شكراً لطلبك من Lgrinta. سيتم التواصل معك قريباً لتأكيد الطلب وإتمام التسليم عبر واتساب.</p>
    <button class="btn-success" onclick="window.location.href='index.html'">العودة للمتجر</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>
<script src="js/cart.js"></script>
<script>
const WHATSAPP_NUMBER = '21696672771';

document.addEventListener('DOMContentLoaded', async () => {
  const params = new URLSearchParams(window.location.search);
  const productId = params.get('product');
  let checkoutItems = getCart();

  if (productId) {
    const { data } = await _supabase.from('products').select('*').eq('id', productId).single();
    if (data) checkoutItems = [{ ...data, qty: 1 }];
  }

  if (!checkoutItems.length) {
    document.getElementById('main-content').innerHTML = `
      <div class="empty-cart-msg">
        <div class="empty-cart-icon"><svg width="15" height="15" style="flex-shrink:0;display:inline-block;vertical-align:middle" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg></div>
        <h3>السلة فارغة</h3>
        <p>لم تضف أي منتجات بعد</p>
        <a href="index.html" class="btn-shop">← تصفح المنتجات</a>
      </div>`; return;
  }

  const total = checkoutItems.reduce((s, i) => s + i.price * (i.qty || 1), 0);

  document.getElementById('main-content').innerHTML = `
    <!-- ORDER SUMMARY -->
    <div class="order-summary-top">
      <div class="summary-title"><svg width="15" height="15" style="flex-shrink:0;display:inline-block;vertical-align:middle" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16.5 9.4 7.55 4.24"/><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg> ملخص الطلب</div>
      ${checkoutItems.map(item => `
        <div class="summary-item">
          <div class="summary-item-icon">${item.icon || '<svg width="15" height="15" style="flex-shrink:0;display:inline-block;vertical-align:middle" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="13" rx="5"/><path d="M8 12h2m-1-1v2M16 12h.01M18 12h.01"/></svg>'}</div>
          <div class="summary-item-info">
            <div class="summary-item-name">${item.title}</div>
            <div class="summary-item-sub">${item.game || ''} ${(item.qty||1) > 1 ? `× ${item.qty}` : ''}</div>
          </div>
          <div class="summary-item-price">${(item.price*(item.qty||1)).toFixed(0)} د.ت</div>
        </div>`).join('')}
      <div class="summary-total-row">
        <span class="summary-total-label">الإجمالي</span>
        <span class="summary-total-value">${total.toFixed(0)} د.ت</span>
      </div>
    </div>

    <!-- CONTACT INFO -->
    <div class="form-card">
      <div class="form-card-title"><svg width="15" height="15" style="flex-shrink:0;display:inline-block;vertical-align:middle" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg> معلومات التواصل</div>
      <div class="form-group">
        <label class="form-label">الاسم الكامل *</label>
        <input type="text" class="form-input" id="f-name" placeholder="اسمك الكريم" autocomplete="name"/>
      </div>
      <div class="form-group">
        <label class="form-label">رقم الجوال / واتساب *</label>
        <input type="tel" class="form-input" id="f-phone" placeholder="05xxxxxxxx" autocomplete="tel"/>
      </div>
      <div class="form-group">
        <label class="form-label">البريد الإلكتروني</label>
        <input type="email" class="form-input" id="f-email" placeholder="email@example.com" autocomplete="email"/>
      </div>
      <div class="form-group">
        <label class="form-label">معرّف الحساب / ID (إن وجد)</label>
        <input type="text" class="form-input" id="f-gameid" placeholder="مثال: 123456789"/>
      </div>
    </div>

    <!-- PAYMENT -->
    <div class="form-card">
      <div class="form-card-title">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
        طريقة الدفع
      </div>
      <div class="payment-grid">
        <div class="payment-option"><input type="radio" name="payment" id="pay-stc" value="stcpay" checked/><label class="payment-label" for="pay-stc"><span class="payment-icon-text">STC</span><span class="payment-name">STC Pay</span></label></div>
        <div class="payment-option"><input type="radio" name="payment" id="pay-mada" value="mada"/><label class="payment-label" for="pay-mada"><span class="payment-icon-text">MADA</span><span class="payment-name">مدى</span></label></div>
        <div class="payment-option"><input type="radio" name="payment" id="pay-transfer" value="transfer"/><label class="payment-label" for="pay-transfer"><span class="payment-icon-text">TRF</span><span class="payment-name">تحويل</span></label></div>
        <div class="payment-option"><input type="radio" name="payment" id="pay-paypal" value="paypal"/><label class="payment-label" for="pay-paypal"><span class="payment-icon-text">PP</span><span class="payment-name">PayPal</span></label></div>
        <div class="payment-option"><input type="radio" name="payment" id="pay-crypto" value="crypto"/><label class="payment-label" for="pay-crypto"><span class="payment-icon-text">BTC</span><span class="payment-name">كريبتو</span></label></div>
        <div class="payment-option"><input type="radio" name="payment" id="pay-cash" value="cash"/><label class="payment-label" for="pay-cash"><span class="payment-icon-text">CASH</span><span class="payment-name">نقداً</span></label></div>
      </div>
    </div>

    <!-- NOTES -->
    <div class="form-card">
      <div class="form-card-title"><svg width="15" height="15" style="flex-shrink:0;display:inline-block;vertical-align:middle" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg> ملاحظات</div>
      <textarea class="form-textarea" id="f-notes" placeholder="أي تعليمات أو ملاحظات إضافية..."></textarea>
    </div>

    <div class="error-msg" id="checkout-error"></div>
    <button class="btn-place-order" id="place-order-btn" onclick="placeOrder(${JSON.stringify(checkoutItems).replace(/"/g,'&quot;')}, ${total})">
      <svg width="15" height="15" style="flex-shrink:0;display:inline-block;vertical-align:middle" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg> تأكيد الطلب — ${total.toFixed(0)} د.ت
    </button>
    <p class="security-note"><svg width="15" height="15" style="flex-shrink:0;display:inline-block;vertical-align:middle" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg> معلوماتك محمية ومشفرة بالكامل</p>
  `;
});

async function placeOrder(items, total) {
  const name = document.getElementById('f-name').value.trim();
  const phone = document.getElementById('f-phone').value.trim();
  const email = document.getElementById('f-email').value.trim();
  const gameid = document.getElementById('f-gameid').value.trim();
  const notes = document.getElementById('f-notes').value.trim();
  const payment = document.querySelector('input[name="payment"]:checked')?.value || 'stcpay';
  const errEl = document.getElementById('checkout-error');
  const btn = document.getElementById('place-order-btn');

  errEl.classList.remove('show');
  if (!name || !phone) { errEl.textContent = 'يرجى ملء الاسم ورقم الجوال'; errEl.classList.add('show'); errEl.scrollIntoView({behavior:'smooth'}); return; }

  btn.disabled = true; btn.textContent = 'جاري إرسال الطلب...';

  const user = await getCurrentUser();
  for (const item of items) {
    try { await _supabase.from('orders').insert({ user_id:user?.id||null, product_id:item.id, product_title:item.title, amount:item.price*(item.qty||1), status:'pending' }); } catch(e){}
  }

  const itemsList = items.map(i => `• ${i.title} × ${i.qty||1} = ${(i.price*(i.qty||1)).toFixed(0)} د.ت`).join('\n');
  const msg = ` طلب جديد من Lgrinta\n\n ${name}\n ${phone}\n ${email||'—'}\n ID: ${gameid||'—'}\n ${payment}\n\n المنتجات:\n${itemsList}\n\n الإجمالي: ${total.toFixed(0)} د.ت\n\n ${notes||'—'}`;
  window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(msg)}`, '_blank');

  clearCart();
  document.getElementById('success-overlay').classList.add('show');
}
</script>
</body>
</html>
