<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>تفاصيل المنتج — Lgrinta</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&family=Bebas+Neue&display=swap" rel="stylesheet"/>
  <style>
    :root{--gold:#D4AF37;--gold-dim:rgba(212,175,55,0.15);--bg:#070709;--bg2:#0d0d10;--surface:#15151e;--surface2:#1c1c28;--border:rgba(212,175,55,0.18);--text:#e8e8f0;--text-muted:#7a7a90;--text-dim:#50505f;--red:#ff3b5c;--green:#25D366;--radius:12px;--radius-lg:18px;}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:80px;}

    nav{position:fixed;top:0;left:0;right:0;z-index:100;height:60px;padding:0 16px;display:flex;align-items:center;justify-content:space-between;background:rgba(7,7,9,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}
    .nav-logo{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:3px;color:var(--gold);text-decoration:none;}
    .nav-back{display:flex;align-items:center;gap:6px;color:var(--text-muted);text-decoration:none;font-size:13px;font-weight:600;background:var(--surface2);border:1px solid var(--border);padding:8px 14px;border-radius:10px;transition:all .2s;}
    .nav-back:hover{color:var(--gold);border-color:var(--gold);}
    .nav-cart-btn{position:relative;display:flex;align-items:center;gap:5px;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;text-decoration:none;}
    #cart-badge{position:absolute;top:-7px;right:-7px;background:var(--gold);color:#000;width:18px;height:18px;border-radius:50%;font-size:10px;font-weight:900;display:none;align-items:center;justify-content:center;}

    .page-wrap{padding:76px 16px 20px;}

    /* BREADCRUMB */
    .breadcrumb{display:flex;align-items:center;gap:6px;margin-bottom:20px;font-size:12px;color:var(--text-muted);overflow-x:auto;white-space:nowrap;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:2px;}
    .breadcrumb::-webkit-scrollbar{display:none;}
    .breadcrumb a{color:var(--text-muted);text-decoration:none;}
    .breadcrumb a:hover{color:var(--gold);}

    /* PRODUCT VISUAL */
    .product-main-img{
      width:100%;aspect-ratio:16/9;border-radius:var(--radius-lg);
      background:var(--surface);border:1px solid var(--border);
      display:flex;align-items:center;justify-content:center;
      font-size:80px;margin-bottom:20px;position:relative;overflow:hidden;
    }
    .product-main-img::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 60% at 50% 50%,rgba(212,175,55,.08),transparent);}
    .product-main-emoji{position:relative;z-index:1;filter:drop-shadow(0 8px 20px rgba(0,0,0,.6));}
    .product-badges-row{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;}
    .badge-chip{background:var(--surface2);border:1px solid var(--border);padding:5px 12px;border-radius:8px;font-size:11px;font-weight:700;color:var(--text-muted);}
    .badge-chip.gold{background:var(--gold-dim);border-color:var(--gold);color:var(--gold);}
    .badge-chip.red{background:rgba(255,59,92,.1);border-color:var(--red);color:var(--red);}
    .badge-chip.green{background:rgba(37,211,102,.1);border-color:var(--green);color:var(--green);}

    /* PRODUCT INFO */
    .product-detail-game{font-size:11px;color:var(--gold);font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;}
    .product-detail-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(28px,7vw,44px);letter-spacing:1px;color:var(--text);line-height:1.05;margin-bottom:16px;}

    .price-card{display:flex;align-items:center;gap:14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px 20px;margin-bottom:20px;}
    .price-main{font-size:32px;font-weight:900;color:var(--gold);}
    .price-currency{font-size:14px;font-weight:500;}
    .price-old{font-size:16px;color:var(--text-dim);text-decoration:line-through;}
    .price-save{background:rgba(255,59,92,.12);border:1px solid rgba(255,59,92,.3);color:var(--red);padding:4px 10px;border-radius:6px;font-size:12px;font-weight:800;margin-right:auto;}

    .meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;}
    .meta-item{background:var(--surface2);border:1px solid rgba(255,255,255,.05);border-radius:12px;padding:12px;}
    .meta-label{font-size:10px;color:var(--text-dim);margin-bottom:3px;letter-spacing:.5px;}
    .meta-value{font-size:13px;font-weight:700;color:var(--text);}

    .product-desc{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px;margin-bottom:20px;}
    .product-desc h4{font-size:13px;font-weight:800;color:var(--gold);margin-bottom:10px;}
    .product-desc p{font-size:14px;color:var(--text-muted);line-height:1.8;}
    .product-desc ul{padding-right:18px;margin-top:10px;}
    .product-desc li{font-size:13px;color:var(--text-muted);margin-bottom:6px;}

    /* ACTION BUTTONS */
    .actions-sticky{
      position:fixed;bottom:0;left:0;right:0;z-index:100;
      background:rgba(7,7,9,.95);backdrop-filter:blur(20px);
      border-top:1px solid var(--border);
      padding:12px 16px;
      display:flex;gap:10px;
    }
    .btn-buy-now{
      flex:1;background:linear-gradient(135deg,var(--gold),#b8960c);
      color:#000;border:none;padding:14px 16px;border-radius:14px;
      font-size:16px;font-weight:800;cursor:pointer;
      display:flex;align-items:center;justify-content:center;gap:8px;
      transition:all .2s;font-family:'Tajawal',sans-serif;
    }
    .btn-whatsapp-sticky{
      background:var(--green);color:#fff;border:none;
      width:52px;height:52px;border-radius:14px;
      display:flex;align-items:center;justify-content:center;
      font-size:24px;cursor:pointer;text-decoration:none;
      transition:all .2s;flex-shrink:0;
    }
    .btn-whatsapp-sticky:hover{background:#1ebe59;}
    .btn-cart-sticky{
      background:var(--surface2);color:var(--text);
      border:1px solid var(--border);
      width:52px;height:52px;border-radius:14px;
      display:flex;align-items:center;justify-content:center;
      font-size:22px;cursor:pointer;transition:all .2s;flex-shrink:0;
    }
    .btn-cart-sticky:hover{border-color:var(--gold);}

    /* QUICK ORDER FORM */
    .quick-order-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;margin-bottom:24px;}
    .quick-order-title{font-size:15px;font-weight:800;color:var(--gold);margin-bottom:16px;display:flex;align-items:center;gap:8px;}
    .form-group{margin-bottom:14px;}
    .form-label{font-size:12px;font-weight:700;color:var(--text-muted);letter-spacing:.5px;margin-bottom:7px;display:block;}
    .form-input,.form-select,.form-textarea{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:10px;padding:12px 14px;font-family:'Tajawal',sans-serif;font-size:15px;outline:none;transition:border-color .2s;-webkit-appearance:none;}
    .form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--gold);}
    .form-input::placeholder{color:var(--text-dim);}
    .form-textarea{resize:vertical;min-height:72px;}
    .form-select option{background:var(--surface2);}
    .btn-submit{width:100%;background:linear-gradient(135deg,var(--gold),#b8960c);color:#000;border:none;padding:14px;border-radius:12px;font-size:16px;font-weight:800;cursor:pointer;font-family:'Tajawal',sans-serif;transition:all .2s;}
    .btn-submit:disabled{opacity:.6;cursor:not-allowed;}

    .success-msg{display:none;text-align:center;padding:20px;background:rgba(37,211,102,.08);border:1px solid rgba(37,211,102,.3);border-radius:12px;margin-top:12px;}
    .success-msg.show{display:block;}
    .success-msg h4{color:var(--green);font-size:16px;font-weight:800;margin-bottom:6px;}
    .success-msg p{font-size:13px;color:var(--text-muted);}

    /* RELATED */
    .related-section{margin-top:40px;}
    .related-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;}

    /* PRODUCT CARD mini */
    .product-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;cursor:pointer;transition:all .3s;-webkit-tap-highlight-color:transparent;}
    .product-card:active{transform:scale(.98);}
    .product-img-wrap{position:relative;aspect-ratio:4/3;overflow:hidden;}
    .product-img{width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:var(--surface2);}
    .img-default{background:linear-gradient(135deg,#12121a,#1c1c28);}
    .img-ps{background:linear-gradient(135deg,#00339922,#003397);}
    .img-xbox{background:linear-gradient(135deg,#10700022,#107000);}
    .img-steam{background:linear-gradient(135deg,#1b2a3b,#2a475e);}
    .img-pubg{background:linear-gradient(135deg,#2d1f0e,#f4a018);}
    .img-free{background:linear-gradient(135deg,#1a0d2e,#6a0dad);}
    .img-social{background:linear-gradient(135deg,#1a1a2e,#16213e);}
    .img-itunes{background:linear-gradient(135deg,#1c0a00,#fc3c44);}
    .img-google{background:linear-gradient(135deg,#0a1628,#4285f4);}
    .product-icon{font-size:36px;filter:drop-shadow(0 4px 10px rgba(0,0,0,.5));}
    .product-badge{position:absolute;top:8px;right:8px;background:linear-gradient(135deg,var(--gold),#b8960c);color:#000;font-size:9px;font-weight:800;padding:3px 8px;border-radius:5px;text-transform:uppercase;}
    .product-discount{position:absolute;top:8px;left:8px;background:var(--red);color:#fff;font-size:10px;font-weight:800;padding:3px 8px;border-radius:5px;}
    .product-info{padding:12px;}
    .product-meta{display:flex;gap:6px;margin-bottom:4px;}
    .product-game{font-size:10px;color:var(--gold);font-weight:700;text-transform:uppercase;}
    .product-region{font-size:10px;color:var(--text-dim);background:var(--surface2);padding:2px 6px;border-radius:4px;}
    .product-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:8px;line-height:1.3;}
    .product-pricing{display:flex;align-items:center;gap:6px;margin-bottom:8px;}
    .product-price{font-size:15px;font-weight:900;color:var(--gold);}
    .currency{font-size:11px;}
    .product-old-price{font-size:11px;color:var(--text-dim);text-decoration:line-through;}
    .btn-add-cart{width:100%;background:var(--surface2);color:var(--text);border:1px solid var(--border);padding:8px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;transition:all .2s;font-family:'Tajawal',sans-serif;}
    .btn-add-cart:hover{background:var(--gold-dim);border-color:var(--gold);color:var(--gold);}

    .spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;margin:40px auto;}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* Cart sidebar (bottom sheet on mobile) */
    .cart-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:300;opacity:0;pointer-events:none;transition:opacity .3s;backdrop-filter:blur(4px);}
    .cart-overlay.open{opacity:1;pointer-events:all;}
    .cart-sidebar{position:fixed;bottom:0;left:0;right:0;max-height:90svh;background:var(--bg2);border-top:1px solid var(--border);border-radius:24px 24px 0 0;z-index:301;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);}
    .cart-overlay.open .cart-sidebar{transform:translateY(0);}
    .cart-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 0;}
    .cart-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
    .cart-header-title{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:1px;color:var(--gold);}
    .btn-close-cart{background:var(--surface2);border:1px solid var(--border);color:var(--text);width:34px;height:34px;border-radius:8px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;}
    .cart-items{flex:1;overflow-y:auto;padding:16px 20px;}
    .cart-item{display:flex;gap:12px;padding:14px 0;border-bottom:1px solid rgba(255,255,255,.05);}
    .cart-item-icon{width:46px;height:46px;border-radius:10px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
    .cart-item-info{flex:1;min-width:0;}
    .cart-item-name{font-size:13px;font-weight:700;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .cart-item-sub{font-size:11px;color:var(--text-muted);}
    .ci-price{font-size:15px;font-weight:900;color:var(--gold);white-space:nowrap;}
    .btn-remove{background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:18px;padding:4px;}
    .cart-empty{text-align:center;padding:48px 20px;color:var(--text-muted);}
    .cart-footer{padding:16px 20px;border-top:1px solid var(--border);}
    .cart-total-row{display:flex;justify-content:space-between;margin-bottom:14px;}
    .total-label{font-size:14px;color:var(--text-muted);}
    .total-value{font-size:22px;font-weight:900;color:var(--gold);}
    .btn-checkout{width:100%;background:linear-gradient(135deg,var(--gold),#b8960c);color:#000;border:none;padding:15px;border-radius:14px;font-size:16px;font-weight:800;cursor:pointer;font-family:'Tajawal',sans-serif;}

    @media(min-width:768px){
      body{padding-bottom:0;}
      nav{height:70px;padding:0 40px;}
      .page-wrap{max-width:1100px;margin:0 auto;padding:90px 40px 80px;}
      .product-layout{display:grid;grid-template-columns:1fr 1.1fr;gap:48px;align-items:start;}
      .product-main-img{aspect-ratio:1;font-size:120px;position:sticky;top:90px;}
      .actions-sticky{position:static;background:none;backdrop-filter:none;border:none;padding:0;flex-wrap:wrap;}
      .btn-buy-now{flex:none;width:100%;}
      .btn-whatsapp-sticky{width:auto;padding:14px 20px;border-radius:14px;gap:8px;font-size:15px;}
      .btn-whatsapp-sticky::after{content:'طلب عبر واتساب';}
      .btn-cart-sticky{width:auto;padding:14px 20px;border-radius:14px;gap:8px;font-size:15px;}
      .btn-cart-sticky::after{content:'أضف للسلة';}
      .related-grid{grid-template-columns:repeat(auto-fill,minmax(200px,1fr));}
      .cart-sidebar{top:0;bottom:auto;left:auto;right:0;width:400px;max-height:100vh;border-radius:0;border-top:none;border-left:1px solid var(--border);transform:translateX(100%);}
      .cart-overlay.open .cart-sidebar{transform:translateX(0);}
      .cart-handle{display:none;}
    }
  </style>
</head>
<body>

<nav>
  <a href="index.html" style="display:flex;align-items:center;gap:8px;text-decoration:none"><img src="img.png" alt="Lgrinta" style="height:38px;width:38px;object-fit:contain;filter:drop-shadow(0 2px 8px rgba(212,175,55,.4))"/><span style="font-family:Bebas Neue,sans-serif;font-size:22px;letter-spacing:3px;color:#D4AF37">LGRINTA</span></a>
  <div style="display:flex;gap:8px;align-items:center;">
    <a href="index.html" class="nav-back">← المتجر</a>
    <a href="#" class="nav-cart-btn" onclick="toggleCart();return false;"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg> <span id="cart-badge">0</span></a>
  </div>
</nav>

<div class="page-wrap">
  <div class="breadcrumb">
    <a href="index.html">الرئيسية</a>
    <span>›</span>
    <a href="index.html#products">المنتجات</a>
    <span>›</span>
    <span id="breadcrumb-title">جاري التحميل...</span>
  </div>

  <div id="product-page-content"><div class="spinner"></div></div>
</div>

<!-- CART SIDEBAR -->
<div class="cart-overlay" id="cart-overlay" onclick="toggleCart()">
  <div class="cart-sidebar" onclick="event.stopPropagation()">
    <div class="cart-handle"></div>
    <div class="cart-header">
      <span class="cart-header-title"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg> السلة</span>
      <button class="btn-close-cart" onclick="toggleCart()"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="cart-items" id="cart-items-list"></div>
    <div id="cart-footer-el" style="display:none" class="cart-footer">
      <div class="cart-total-row"><span class="total-label">الإجمالي</span><span class="total-value" id="cart-total">0' + formatPrice('').replace(/[0-9.]+/, '') </span></div>
      <button class="btn-checkout" onclick="window.location.href='checkout.html'">إتمام الطلب ←</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>
<script src="js/cart.js"></script>
<script src="js/products.js"></script>
<script>
const WHATSAPP_NUMBER = '21696672771';

document.addEventListener('DOMContentLoaded', async () => {
  updateCartBadgeLocal();
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');
  if (!id) { window.location.href = 'index.html'; return; }

  const { data: product, error } = await _supabase.from('products').select('*').eq('id', id).single();
  if (error || !product) { window.location.href = 'index.html'; return; }

  document.title = `${product.title} — Lgrinta`;
  document.getElementById('breadcrumb-title').textContent = product.title;

  const discount = product.old_price ? Math.round((1 - product.price / product.old_price) * 100) : null;
  const safeTitle = product.title.replace(/'/g, "\\'");
  const safeIcon = (product.icon || '<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="13" rx="5"/><path d="M8 12h2m-1-1v2M16 12h.01M18 12h.01"/></svg>').replace(/'/g, "\\'");
  const safeGame = (product.game || '').replace(/'/g, "\\'");

  document.getElementById('product-page-content').innerHTML = `
    <div class="product-layout">
      <div class="product-visual">
        <div class="product-main-img ${product.img_class || 'img-default'}">
          <span class="product-main-emoji">${product.icon || '<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="13" rx="5"/><path d="M8 12h2m-1-1v2M16 12h.01M18 12h.01"/></svg>'}</span>
        </div>
        <div class="product-badges-row">
          ${product.badge ? `<span class="badge-chip gold"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg> ${product.badge}</span>` : ''}
          ${discount ? `<span class="badge-chip red">خصم ${discount}%</span>` : ''}
          ${product.region ? `<span class="badge-chip"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg> ${product.region}</span>` : ''}
          <span class="badge-chip ${product.in_stock ? 'green' : 'red'}">${product.in_stock ? '<svg class="ic ic-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> متوفر' : '<svg class="ic ic-x" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg> نفذ'}</span>
        </div>
      </div>

      <div class="product-details">
        <div class="product-detail-game">${product.game || product.category || ''}</div>
        <h1 class="product-detail-title">${product.title}</h1>

        <div class="price-card">
          <div>
            <div class="price-main">${product.price} <span class="price-currency">SAR</span></div>
            ${product.old_price ? `<div class="price-old">${product.old_price}' + formatPrice('').replace(/[0-9.]+/, '') </div>` : ''}
          </div>
          ${discount ? `<div class="price-save">وفّر ${discount}%</div>` : ''}
        </div>

        <div class="meta-grid">
          <div class="meta-item"><div class="meta-label">القسم</div><div class="meta-value">${product.category || '—'}</div></div>
          <div class="meta-item"><div class="meta-label">اللعبة / الخدمة</div><div class="meta-value">${product.game || '—'}</div></div>
          <div class="meta-item"><div class="meta-label">المنطقة</div><div class="meta-value">${product.region || 'عالمي'}</div></div>
          <div class="meta-item"><div class="meta-label">الحالة</div><div class="meta-value" style="color:${product.in_stock ? 'var(--green)' : 'var(--red)'}">${product.in_stock ? 'متوفر <svg class="ic ic-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>' : 'نفذ <svg class="ic ic-x" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>'}</div></div>
        </div>

        <div class="product-desc">
          <h4><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/></svg> وصف المنتج</h4>
          <p>${product.description || 'منتج رقمي عالي الجودة. يتم التسليم فورياً بعد إتمام الدفع. للاستفسار تواصل معنا عبر واتساب.'}</p>
          <ul>
            <li><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg> تسليم فوري بعد الدفع</li>
            <li><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg> معاملة آمنة ومضمونة</li>
            <li style="display:flex;align-items:center;gap:8px"><svg style="width:18px;height:18px;flex-shrink:0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 18v-6a9 9 0 0 1 18 0v6"/><path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3z"/><path d="M3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"/></svg> دعم على مدار الساعة</li>
          </ul>
        </div>

        <!-- QUICK ORDER FORM -->
        <div class="quick-order-card">
          <div class="quick-order-title"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/></svg> طلب سريع</div>
          <form id="quick-order-form">
            <div class="form-group">
              <label class="form-label">الاسم الكامل *</label>
              <input type="text" class="form-input" name="name" placeholder="اسمك الكريم" required/>
            </div>
            <div class="form-group">
              <label class="form-label">رقم الواتساب *</label>
              <input type="tel" class="form-input" name="phone" placeholder="05xxxxxxxx" required/>
            </div>
            <div class="form-group">
              <label class="form-label">معرّف الحساب / ID</label>
              <input type="text" class="form-input" name="account_id" placeholder="مثال: 123456789"/>
            </div>
            <div class="form-group">
              <label class="form-label">طريقة الدفع</label>
              <select class="form-select" name="payment">
                <option value="stcpay"><svg class="ic" viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg> STC Pay</option>
                <option value="mada"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg> مدى</option>
                <option value="transfer"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="22" x2="21" y2="22"/><line x1="6" y1="18" x2="6" y2="11"/><line x1="10" y1="18" x2="10" y2="11"/><line x1="14" y1="18" x2="14" y2="11"/><line x1="18" y1="18" x2="18" y2="11"/><polygon points="12 2 20 7 4 7"/></svg> تحويل بنكي</option>
                <option value="paypal"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 17V7h4a3 3 0 0 1 0 6H9"/></svg> PayPal</option>
                <option value="crypto"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11.767 19.089c4.924.868 6.14-6.025 1.216-6.894m-1.216 6.894L5.86 18.047m5.908 1.042-.347 1.97m1.563-8.864c4.924.869 6.14-6.025 1.215-6.893m-1.215 6.893-3.94-.694m5.155-6.2L8.29 4.26m5.908 1.042.348-1.97M7.48 20.364l3.126-17.727"/></svg> كريبتو</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">ملاحظات</label>
              <textarea class="form-textarea" name="notes" placeholder="أي تفاصيل إضافية..."></textarea>
            </div>
            <input type="hidden" name="product_id" value="${product.id}"/>
            <input type="hidden" name="product_title" value="${product.title}"/>
            <input type="hidden" name="product_price" value="${product.price}"/>
            <button type="submit" class="btn-submit" id="submit-btn">إرسال الطلب ←</button>
          </form>
          <div class="success-msg" id="success-msg">
            <h4><svg class="ic ic-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> تم استلام طلبك!</h4>
            <p>سنتواصل معك قريباً عبر واتساب.</p>
          </div>
        </div>
      </div>
    </div>

    <!-- RELATED -->
    <div class="related-section">
      <div style="font-size:11px;letter-spacing:2px;color:var(--gold);font-weight:700;margin-bottom:6px;">منتجات مشابهة</div>
      <div style="font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:1px;margin-bottom:8px;">قد يعجبك أيضاً</div>
      <div style="width:40px;height:2px;background:linear-gradient(90deg,var(--gold),transparent);margin-bottom:20px;"></div>
      <div class="related-grid" id="related-grid"><div class="spinner"></div></div>
    </div>
  `;

  // Sticky action buttons (mobile)
  const existingSticky = document.querySelector('.actions-sticky');
  if (!existingSticky) {
    const sticky = document.createElement('div');
    sticky.className = 'actions-sticky';
    sticky.innerHTML = `
      <button class="btn-buy-now" onclick="window.location.href='checkout.html?product=${product.id}'"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg> شراء الآن</button>
      <a class="btn-whatsapp-sticky" href="https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent('مرحبا، أريد طلب: ' + product.title + ' - السعر: ' + product.price + '' + formatPrice('').replace(/[0-9.]+/, '') ')}" target="_blank"><svg style="width:20px;height:20px;flex-shrink:0" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.127.558 4.126 1.532 5.859L.057 23.6a.75.75 0 0 0 .92.92l5.741-1.474A11.953 11.953 0 0 0 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.75a9.72 9.72 0 0 1-4.962-1.362l-.355-.21-3.685.946.982-3.584-.232-.37A9.718 9.718 0 0 1 2.25 12C2.25 6.615 6.615 2.25 12 2.25S21.75 6.615 21.75 12 17.385 21.75 12 21.75z"/></svg></a>
      <button class="btn-cart-sticky" onclick="addToCart({id:${product.id},title:'${safeTitle}',price:${product.price},icon:'${safeIcon}',game:'${safeGame}'})"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg></button>
    `;
    document.body.appendChild(sticky);
  }

  // Form submit
  document.getElementById('quick-order-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submit-btn');
    btn.disabled = true; btn.textContent = 'جاري الإرسال...';
    const data = Object.fromEntries(new FormData(e.target));
    try {
      const user = await getCurrentUser();
      await _supabase.from('orders').insert({ user_id: user?.id||null, product_id: parseInt(data.product_id), product_title: data.product_title, amount: parseFloat(data.product_price), status:'pending', customer_name:data.name, customer_phone:data.phone, account_id:data.account_id||null, payment_method:data.payment, notes:data.notes||null });
    } catch(e){}
    document.getElementById('quick-order-form').style.display = 'none';
    document.getElementById('success-msg').classList.add('show');
    const msg = `<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg> طلب جديد\n\n<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16.5 9.4 7.55 4.24"/><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg> ${data.product_title}\n<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg> ${data.product_price}' + formatPrice('').replace(/[0-9.]+/, '') \n<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg> ${data.name}\n<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg> ${data.phone}\n<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="13" rx="5"/><path d="M8 12h2m-1-1v2M16 12h.01M18 12h.01"/></svg> ID: ${data.account_id||'—'}\n<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg> ${data.payment}\n<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg> ${data.notes||'—'}`;
    window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(msg)}`, '_blank');
  });

  loadRelated(product);
});

async function loadRelated(product) {
  const { data } = await _supabase.from('products').select('*').eq('category', product.category).eq('in_stock', true).neq('id', product.id).limit(4);
  const grid = document.getElementById('related-grid');
  if (!grid) return;
  if (!data?.length) { grid.innerHTML = '<p style="color:var(--text-muted);grid-column:1/-1;font-size:14px">لا توجد منتجات مشابهة</p>'; return; }
  grid.innerHTML = data.map(renderProductCard).join('');
}

function updateCartBadgeLocal() {
  const count = JSON.parse(localStorage.getItem('lgrinta_cart')||'[]').reduce((s,i)=>s+(i.qty||1),0);
  const b = document.getElementById('cart-badge');
  if(b){b.textContent=count;b.style.display=count>0?'flex':'none';}
}
window.updateCartBadge = updateCartBadgeLocal;

function toggleCart() {
  const ov = document.getElementById('cart-overlay');
  ov.classList.toggle('open');
  if (ov.classList.contains('open')) renderCartSidebar();
}

function renderCartSidebar() {
  const cart = JSON.parse(localStorage.getItem('lgrinta_cart')||'[]');
  const listEl = document.getElementById('cart-items-list');
  const footerEl = document.getElementById('cart-footer-el');
  const totalEl = document.getElementById('cart-total');
  if (!cart.length) {
    listEl.innerHTML = '<div class="cart-empty"><div style="font-size:48px;opacity:.3;margin-bottom:10px"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg></div><p>السلة فارغة</p></div>';
    footerEl.style.display = 'none'; return;
  }
  listEl.innerHTML = cart.map(item => `
    <div class="cart-item">
      <div class="cart-item-icon">${item.icon||'<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="13" rx="5"/><path d="M8 12h2m-1-1v2M16 12h.01M18 12h.01"/></svg>'}</div>
      <div class="cart-item-info">
        <div class="cart-item-name">${item.title}</div>
        <div class="cart-item-sub">${item.game||''} ${(item.qty||1)>1?`× ${item.qty}`:''}</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
        <span class="ci-price">${(item.price*(item.qty||1)).toFixed(0)}' + formatPrice('').replace(/[0-9.]+/, '') </span>
        <button class="btn-remove" onclick="removeFromCart(${item.id});updateCartBadgeLocal();renderCartSidebar()"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg></button>
      </div>
    </div>`).join('');
  const total = cart.reduce((s,i)=>s+i.price*(i.qty||1),0);
  totalEl.textContent = `${total.toFixed(0)}' + formatPrice('').replace(/[0-9.]+/, '') `;
  footerEl.style.display = 'block';
}
</script>
</body>
</html>
