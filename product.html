<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>تفاصيل المنتج — Lgrinta</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&family=Bebas+Neue&display=swap" rel="stylesheet"/>
  <style>
    :root{
      --gold:#D4AF37;--gold-light:#F0D060;--gold-dim:rgba(212,175,55,0.15);
      --bg:#070709;--bg2:#0d0d10;--bg3:#12121a;
      --surface:#15151e;--surface2:#1c1c28;
      --border:rgba(212,175,55,0.18);
      --text:#e8e8f0;--text-muted:#7a7a90;--text-dim:#50505f;
      --red:#ff3b5c;--cyan:#00d4ff;
      --radius:12px;--radius-lg:20px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

    nav{
      position:fixed;top:0;left:0;right:0;z-index:100;
      padding:0 40px;height:70px;
      display:flex;align-items:center;justify-content:space-between;
      background:rgba(7,7,9,.9);backdrop-filter:blur(20px);
      border-bottom:1px solid var(--border);
    }
    .nav-logo{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:3px;color:var(--gold);text-decoration:none;text-shadow:0 0 30px rgba(212,175,55,.5);}
    .nav-links{display:flex;align-items:center;gap:8px;}
    .nav-link{color:var(--text-muted);text-decoration:none;padding:8px 16px;border-radius:8px;font-size:14px;font-weight:500;transition:all .2s;border:1px solid transparent;}
    .nav-link:hover{color:var(--gold);border-color:var(--border);}
    .nav-cart{position:relative;display:flex;align-items:center;gap:6px;color:var(--text);background:var(--surface2);border:1px solid var(--border);padding:8px 16px;border-radius:10px;cursor:pointer;font-size:14px;font-weight:600;text-decoration:none;transition:all .2s;}
    .nav-cart:hover{border-color:var(--gold);color:var(--gold);}
    #cart-badge{position:absolute;top:-6px;right:-6px;background:var(--gold);color:#000;width:20px;height:20px;border-radius:50%;font-size:11px;font-weight:800;display:none;align-items:center;justify-content:center;}
    .nav-auth-btn{background:linear-gradient(135deg,var(--gold),#b8960c);color:#000;border:none;padding:9px 20px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;text-decoration:none;transition:all .2s;font-family:'Tajawal',sans-serif;}
    #nav-user{display:none;align-items:center;gap:10px;}
    #nav-admin{display:none;}
    .user-chip{display:flex;align-items:center;gap:8px;background:var(--surface2);border:1px solid var(--border);padding:7px 14px;border-radius:10px;font-size:13px;}
    .user-avatar{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--gold),#8B6914);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#000;}
    .btn-signout{color:var(--text-muted);background:none;border:none;cursor:pointer;font-size:12px;font-family:'Tajawal',sans-serif;}

    /* ─── PAGE LAYOUT ─── */
    .page-wrap{max-width:1100px;margin:0 auto;padding:110px 40px 80px;}

    .breadcrumb{display:flex;align-items:center;gap:8px;margin-bottom:32px;font-size:13px;color:var(--text-muted);}
    .breadcrumb a{color:var(--text-muted);text-decoration:none;}
    .breadcrumb a:hover{color:var(--gold);}
    .breadcrumb span{color:var(--text-dim);}

    .product-layout{display:grid;grid-template-columns:1fr 1.1fr;gap:48px;align-items:start;}

    /* ─── LEFT: Image / Visual ─── */
    .product-visual{position:sticky;top:90px;}
    .product-main-img{
      width:100%;aspect-ratio:1;border-radius:var(--radius-lg);
      background:var(--surface);border:1px solid var(--border);
      display:flex;align-items:center;justify-content:center;
      font-size:120px;position:relative;overflow:hidden;
    }
    .product-main-img::before{
      content:'';position:absolute;inset:0;
      background:radial-gradient(ellipse 60% 60% at 50% 50%,rgba(212,175,55,.08),transparent);
    }
    .product-main-emoji{filter:drop-shadow(0 8px 24px rgba(0,0,0,.6));position:relative;z-index:1;}
    .product-badges-row{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap;}
    .badge-chip{
      background:var(--surface2);border:1px solid var(--border);
      padding:6px 14px;border-radius:8px;font-size:12px;font-weight:600;
      color:var(--text-muted);
    }
    .badge-chip.gold{background:var(--gold-dim);border-color:var(--gold);color:var(--gold);}
    .badge-chip.red{background:rgba(255,59,92,.1);border-color:var(--red);color:var(--red);}

    /* ─── RIGHT: Info ─── */
    .product-details{}
    .product-detail-game{font-size:12px;color:var(--gold);font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:12px;}
    .product-detail-title{
      font-family:'Bebas Neue',sans-serif;font-size:clamp(32px,5vw,52px);
      letter-spacing:1px;color:var(--text);line-height:1.05;margin-bottom:20px;
    }
    .product-detail-price-wrap{
      display:flex;align-items:center;gap:16px;
      background:var(--surface);border:1px solid var(--border);
      border-radius:var(--radius-lg);padding:20px 24px;margin-bottom:24px;
    }
    .price-main{font-size:36px;font-weight:900;color:var(--gold);}
    .price-currency{font-size:16px;font-weight:500;}
    .price-old{font-size:18px;color:var(--text-dim);text-decoration:line-through;}
    .price-save{
      background:rgba(255,59,92,.12);border:1px solid rgba(255,59,92,.3);
      color:var(--red);padding:4px 12px;border-radius:6px;font-size:13px;font-weight:700;
    }

    .product-meta-grid{
      display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px;
    }
    .meta-item{
      background:var(--surface2);border:1px solid rgba(255,255,255,.05);
      border-radius:12px;padding:14px;
    }
    .meta-label{font-size:11px;color:var(--text-dim);margin-bottom:4px;letter-spacing:.5px;}
    .meta-value{font-size:14px;font-weight:700;color:var(--text);}

    .product-description{
      color:var(--text-muted);font-size:15px;line-height:1.8;
      margin-bottom:28px;
    }
    .product-description h4{color:var(--text);font-size:14px;font-weight:700;margin-bottom:8px;margin-top:16px;}
    .product-description ul{padding-right:20px;}
    .product-description li{margin-bottom:6px;}

    /* ─── ACTION BUTTONS ─── */
    .actions-wrap{display:flex;flex-direction:column;gap:12px;}
    .btn-buy-now{
      width:100%;background:linear-gradient(135deg,var(--gold),#b8960c);
      color:#000;border:none;padding:16px 24px;border-radius:14px;
      font-size:17px;font-weight:800;cursor:pointer;
      display:flex;align-items:center;justify-content:center;gap:10px;
      transition:all .25s;font-family:'Tajawal',sans-serif;
      box-shadow:0 4px 30px rgba(212,175,55,.25);
    }
    .btn-buy-now:hover{transform:translateY(-2px);box-shadow:0 8px 40px rgba(212,175,55,.4);}
    .btn-add-cart-lg{
      width:100%;background:var(--surface);border:1px solid var(--border);
      color:var(--text);padding:15px 24px;border-radius:14px;
      font-size:16px;font-weight:700;cursor:pointer;
      display:flex;align-items:center;justify-content:center;gap:10px;
      transition:all .25s;font-family:'Tajawal',sans-serif;
    }
    .btn-add-cart-lg:hover{border-color:var(--gold);color:var(--gold);background:var(--gold-dim);}
    .btn-whatsapp{
      width:100%;background:#25D366;
      color:#fff;border:none;padding:15px 24px;border-radius:14px;
      font-size:16px;font-weight:700;cursor:pointer;
      display:flex;align-items:center;justify-content:center;gap:10px;
      transition:all .25s;font-family:'Tajawal',sans-serif;text-decoration:none;
    }
    .btn-whatsapp:hover{background:#1ebe59;transform:translateY(-1px);}
    .separator{
      display:flex;align-items:center;gap:12px;color:var(--text-dim);font-size:12px;
    }
    .separator::before,.separator::after{content:'';flex:1;height:1px;background:var(--border);}

    /* ─── QUICK ORDER FORM ─── */
    .quick-order-card{
      background:var(--surface);border:1px solid var(--border);
      border-radius:var(--radius-lg);padding:24px;margin-top:12px;
    }
    .quick-order-title{
      font-size:15px;font-weight:800;color:var(--gold);margin-bottom:18px;
      display:flex;align-items:center;gap:8px;
    }
    .form-group{margin-bottom:16px;}
    .form-label{font-size:12px;font-weight:700;color:var(--text-muted);letter-spacing:.5px;margin-bottom:8px;display:block;}
    .form-input,.form-select,.form-textarea{
      width:100%;background:var(--surface2);border:1px solid var(--border);
      color:var(--text);border-radius:10px;padding:11px 14px;
      font-family:'Tajawal',sans-serif;font-size:14px;outline:none;
      transition:border-color .2s;
    }
    .form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--gold);}
    .form-textarea{resize:vertical;min-height:80px;}
    .form-select option{background:var(--surface2);}
    .btn-submit{
      width:100%;background:linear-gradient(135deg,var(--gold),#b8960c);
      color:#000;border:none;padding:13px;border-radius:12px;
      font-size:15px;font-weight:800;cursor:pointer;
      font-family:'Tajawal',sans-serif;transition:all .2s;
    }
    .btn-submit:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(212,175,55,.4);}
    .btn-submit:disabled{opacity:.6;cursor:not-allowed;transform:none;}

    /* ─── SUCCESS ─── */
    .success-msg{
      display:none;text-align:center;padding:24px;
      background:rgba(37,211,102,.08);border:1px solid rgba(37,211,102,.3);
      border-radius:12px;margin-top:12px;
    }
    .success-msg.show{display:block;}
    .success-msg h4{color:#25D366;font-size:16px;font-weight:800;margin-bottom:6px;}
    .success-msg p{font-size:13px;color:var(--text-muted);}

    /* ─── RELATED ─── */
    .related-section{margin-top:80px;}
    .section-label{font-size:11px;letter-spacing:3px;color:var(--gold);text-transform:uppercase;font-weight:700;margin-bottom:8px;}
    .section-title{font-family:'Bebas Neue',sans-serif;font-size:40px;letter-spacing:1px;color:var(--text);}
    .divider{width:60px;height:2px;background:linear-gradient(90deg,var(--gold),transparent);margin-top:8px;margin-bottom:32px;}
    .related-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;}

    /* PRODUCT CARD (same as index) */
    .product-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;cursor:pointer;transition:all .3s;}
    .product-card:hover{border-color:rgba(212,175,55,.4);transform:translateY(-4px);box-shadow:0 20px 60px rgba(0,0,0,.5);}
    .product-img-wrap{position:relative;aspect-ratio:4/3;overflow:hidden;}
    .product-img{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:64px;background:var(--surface2);transition:transform .4s;}
    .product-card:hover .product-img{transform:scale(1.08);}
    .img-default{background:linear-gradient(135deg,#12121a,#1c1c28);}
    .product-icon{font-size:56px;filter:drop-shadow(0 4px 12px rgba(0,0,0,.5));}
    .product-badge{position:absolute;top:12px;right:12px;background:linear-gradient(135deg,var(--gold),#b8960c);color:#000;font-size:10px;font-weight:800;padding:4px 10px;border-radius:6px;letter-spacing:.5px;text-transform:uppercase;}
    .product-discount{position:absolute;top:12px;left:12px;background:var(--red);color:#fff;font-size:11px;font-weight:800;padding:4px 10px;border-radius:6px;}
    .product-info{padding:18px;}
    .product-meta{display:flex;gap:8px;margin-bottom:6px;flex-wrap:wrap;}
    .product-game{font-size:11px;color:var(--gold);font-weight:700;letter-spacing:.5px;text-transform:uppercase;}
    .product-region{font-size:11px;color:var(--text-dim);background:var(--surface2);padding:2px 8px;border-radius:4px;}
    .product-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:12px;line-height:1.4;}
    .product-pricing{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
    .product-price{font-size:17px;font-weight:800;color:var(--gold);}
    .currency{font-size:12px;font-weight:500;}
    .product-old-price{font-size:13px;color:var(--text-dim);text-decoration:line-through;}
    .btn-add-cart{width:100%;background:var(--surface2);color:var(--text);border:1px solid var(--border);padding:9px 16px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .2s;font-family:'Tajawal',sans-serif;}
    .btn-add-cart:hover{background:var(--gold-dim);border-color:var(--gold);color:var(--gold);}
    .spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;margin:40px auto;}
    @keyframes spin{to{transform:rotate(360deg)}}

    @media(max-width:768px){
      nav{padding:0 20px;}
      .page-wrap{padding:90px 20px 60px;}
      .product-layout{grid-template-columns:1fr;gap:32px;}
      .product-visual{position:static;}
      .product-meta-grid{grid-template-columns:1fr 1fr;}
    }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">LGRINTA</a>
  <div class="nav-links">
    <a href="index.html" class="nav-link">الرئيسية</a>
    <a href="index.html#products" class="nav-link">المنتجات</a>
    <div id="nav-admin">
      <a href="admin/index.html" class="nav-link" style="color:var(--gold);">⚙ لوحة التحكم</a>
    </div>
    <a href="#" class="nav-cart" onclick="toggleCart()">
      🛒 السلة <span id="cart-badge">0</span>
    </a>
    <div id="nav-login">
      <a href="login.html" class="nav-auth-btn">تسجيل الدخول</a>
    </div>
    <div id="nav-user">
      <div class="user-chip">
        <div class="user-avatar" id="user-avatar">U</div>
        <span id="nav-username">مستخدم</span>
        <button class="btn-signout" onclick="signOut()">خروج</button>
      </div>
    </div>
  </div>
</nav>

<div class="page-wrap">
  <div class="breadcrumb">
    <a href="index.html">الرئيسية</a>
    <span>›</span>
    <a href="index.html#products">المنتجات</a>
    <span>›</span>
    <span id="breadcrumb-title">جاري التحميل...</span>
  </div>

  <div id="product-page-content">
    <div class="spinner"></div>
  </div>
</div>

<!-- CART SIDEBAR -->
<div style="position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;opacity:0;pointer-events:none;transition:opacity .3s;backdrop-filter:blur(4px);" id="cart-overlay" onclick="toggleCart()">
  <div style="position:fixed;top:0;right:-420px;width:420px;max-width:100vw;height:100vh;background:var(--bg2);border-left:1px solid var(--border);z-index:201;transition:right .35s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;" id="cart-sidebar" onclick="event.stopPropagation()">
    <div style="padding:24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;">
      <span style="font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:1px;color:var(--gold);">🛒 السلة</span>
      <button style="background:var(--surface2);border:1px solid var(--border);color:var(--text);width:36px;height:36px;border-radius:8px;cursor:pointer;font-size:18px;" onclick="toggleCart()">✕</button>
    </div>
    <div id="cart-items-list" style="flex:1;overflow-y:auto;padding:20px;"></div>
    <div id="cart-footer" style="display:none;padding:20px;border-top:1px solid var(--border);">
      <div style="display:flex;justify-content:space-between;margin-bottom:16px;">
        <span style="color:var(--text-muted);font-size:14px;">الإجمالي</span>
        <span id="cart-total" style="font-size:22px;font-weight:800;color:var(--gold);">0 SAR</span>
      </div>
      <button onclick="window.location.href='checkout.html'" style="width:100%;background:linear-gradient(135deg,var(--gold),#b8960c);color:#000;border:none;padding:14px;border-radius:12px;font-size:16px;font-weight:800;cursor:pointer;font-family:'Tajawal',sans-serif;">إتمام الطلب ←</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>
<script src="js/cart.js"></script>
<script src="js/products.js"></script>
<script>
const WHATSAPP_NUMBER = '966500000000'; // ← غيّر هذا

document.addEventListener('DOMContentLoaded', async () => {
  await updateNavAuth();

  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');
  if (!id) { window.location.href = 'index.html'; return; }

  const { data: product, error } = await _supabase.from('products').select('*').eq('id', id).single();
  if (error || !product) { window.location.href = 'index.html'; return; }

  document.title = `${product.title} — Lgrinta`;
  document.getElementById('breadcrumb-title').textContent = product.title;

  const discount = product.old_price ? Math.round((1 - product.price / product.old_price) * 100) : null;

  document.getElementById('product-page-content').innerHTML = `
    <div class="product-layout">
      <!-- VISUAL -->
      <div class="product-visual">
        <div class="product-main-img ${product.img_class || 'img-default'}">
          <span class="product-main-emoji">${product.icon || '🎮'}</span>
        </div>
        <div class="product-badges-row">
          ${product.badge ? `<span class="badge-chip gold">⭐ ${product.badge}</span>` : ''}
          ${discount ? `<span class="badge-chip red">خصم ${discount}%</span>` : ''}
          ${product.region ? `<span class="badge-chip">🌍 ${product.region}</span>` : ''}
          <span class="badge-chip">${product.in_stock ? '✅ متوفر' : '❌ نفذ'}</span>
        </div>
      </div>

      <!-- DETAILS -->
      <div class="product-details">
        <div class="product-detail-game">${product.game || product.category || ''}</div>
        <h1 class="product-detail-title">${product.title}</h1>

        <div class="product-detail-price-wrap">
          <div>
            <div class="price-main">${product.price} <span class="price-currency">SAR</span></div>
            ${product.old_price ? `<div class="price-old">${product.old_price} SAR</div>` : ''}
          </div>
          ${discount ? `<div class="price-save">وفّر ${discount}%</div>` : ''}
        </div>

        <div class="product-meta-grid">
          <div class="meta-item">
            <div class="meta-label">القسم</div>
            <div class="meta-value">${product.category || '—'}</div>
          </div>
          <div class="meta-item">
            <div class="meta-label">اللعبة / الخدمة</div>
            <div class="meta-value">${product.game || '—'}</div>
          </div>
          <div class="meta-item">
            <div class="meta-label">المنطقة</div>
            <div class="meta-value">${product.region || 'عالمي'}</div>
          </div>
          <div class="meta-item">
            <div class="meta-label">الحالة</div>
            <div class="meta-value" style="color:${product.in_stock ? '#25D366' : 'var(--red)'}">
              ${product.in_stock ? 'متوفر ✅' : 'نفذ المخزون ❌'}
            </div>
          </div>
        </div>

        <div class="product-description">
          <h4>وصف المنتج</h4>
          <p>${product.description || 'منتج رقمي عالي الجودة. يتم التسليم فورياً بعد إتمام الدفع. للاستفسار تواصل معنا عبر واتساب.'}</p>
          <h4 style="margin-top:16px;">ملاحظات</h4>
          <ul>
            <li>التسليم فوري بعد إتمام الدفع</li>
            <li>تأكد من اختيار المنطقة الصحيحة</li>
            <li>الدعم متاح 24/7 عبر واتساب</li>
          </ul>
        </div>

        <div class="actions-wrap">
          <button class="btn-buy-now" onclick="window.location.href='checkout.html?product=${product.id}'">
            ⚡ شراء الآن
          </button>
          <button class="btn-add-cart-lg" onclick="addToCart({id:${product.id},title:'${product.title.replace(/'/g,"\\'")}',price:${product.price},icon:'${product.icon||'🎮'}',game:'${product.game||''}'})">
            🛒 أضف للسلة
          </button>
          <div class="separator">أو</div>
          <a class="btn-whatsapp" href="https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent('مرحبا، أريد طلب: ' + product.title + ' - السعر: ' + product.price + ' SAR')}" target="_blank">
            💬 طلب عبر واتساب
          </a>

          <!-- QUICK ORDER FORM -->
          <div class="quick-order-card">
            <div class="quick-order-title">
              📋 طلب سريع
            </div>
            <form id="quick-order-form">
              <div class="form-group">
                <label class="form-label">الاسم الكامل</label>
                <input type="text" class="form-input" name="name" placeholder="أدخل اسمك" required/>
              </div>
              <div class="form-group">
                <label class="form-label">رقم الواتساب / الجوال</label>
                <input type="tel" class="form-input" name="phone" placeholder="05xxxxxxxx" required/>
              </div>
              <div class="form-group">
                <label class="form-label">معرّف الحساب / ID (إن وجد)</label>
                <input type="text" class="form-input" name="account_id" placeholder="مثال: 123456789"/>
              </div>
              <div class="form-group">
                <label class="form-label">طريقة الدفع المفضلة</label>
                <select class="form-select" name="payment">
                  <option value="stcpay">STC Pay</option>
                  <option value="mada">مدى</option>
                  <option value="transfer">تحويل بنكي</option>
                  <option value="cash">نقداً</option>
                </select>
              </div>
              <div class="form-group">
                <label class="form-label">ملاحظات إضافية</label>
                <textarea class="form-textarea" name="notes" placeholder="أي تفاصيل إضافية..."></textarea>
              </div>
              <input type="hidden" name="product_id" value="${product.id}"/>
              <input type="hidden" name="product_title" value="${product.title}"/>
              <input type="hidden" name="product_price" value="${product.price}"/>
              <button type="submit" class="btn-submit" id="submit-btn">
                إرسال الطلب ←
              </button>
            </form>
            <div class="success-msg" id="success-msg">
              <h4>✅ تم استلام طلبك!</h4>
              <p>سنتواصل معك خلال دقائق عبر واتساب أو الجوال.</p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- RELATED -->
    <div class="related-section">
      <div class="section-label">منتجات مشابهة</div>
      <h2 class="section-title">قد يعجبك أيضاً</h2>
      <div class="divider"></div>
      <div class="related-grid" id="related-grid">
        <div class="spinner"></div>
      </div>
    </div>
  `;

  // Load related products
  loadRelated(product);

  // Quick order form submit
  document.getElementById('quick-order-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.textContent = 'جاري الإرسال...';

    const formData = new FormData(e.target);
    const data = Object.fromEntries(formData);

    // Save order to Supabase
    try {
      const user = await getCurrentUser();
      await _supabase.from('orders').insert({
        user_id: user?.id || null,
        product_id: parseInt(data.product_id),
        product_title: data.product_title,
        amount: parseFloat(data.product_price),
        status: 'pending',
        customer_name: data.name,
        customer_phone: data.phone,
        account_id: data.account_id || null,
        payment_method: data.payment,
        notes: data.notes || null,
      });
    } catch(err) { console.log('DB save optional:', err); }

    // Show success
    document.getElementById('quick-order-form').style.display = 'none';
    document.getElementById('success-msg').classList.add('show');
    btn.disabled = false;

    // WhatsApp notification
    const msg = `🛒 طلب جديد من Lgrinta\n\n📦 المنتج: ${data.product_title}\n💰 السعر: ${data.product_price} SAR\n👤 الاسم: ${data.name}\n📱 الجوال: ${data.phone}\n🎮 ID: ${data.account_id||'—'}\n💳 الدفع: ${data.payment}\n📝 ملاحظات: ${data.notes||'—'}`;
    window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(msg)}`, '_blank');
  });
});

async function loadRelated(product) {
  const { data } = await _supabase.from('products')
    .select('*').eq('category', product.category)
    .eq('in_stock', true).neq('id', product.id).limit(4);

  const grid = document.getElementById('related-grid');
  if (!grid) return;
  if (!data || data.length === 0) {
    grid.innerHTML = '<p style="color:var(--text-muted);grid-column:1/-1">لا توجد منتجات مشابهة حالياً.</p>';
    return;
  }
  grid.innerHTML = data.map(renderProductCard).join('');
}

// Cart sidebar
function toggleCart() {
  const ov = document.getElementById('cart-overlay');
  const sb = document.getElementById('cart-sidebar');
  const open = ov.style.opacity === '1';
  ov.style.opacity = open ? '0' : '1';
  ov.style.pointerEvents = open ? 'none' : 'all';
  sb.style.right = open ? '-420px' : '0';
  if (!open) renderCartSidebar();
}
function renderCartSidebar() {
  const cart = getCart();
  const listEl = document.getElementById('cart-items-list');
  const footerEl = document.getElementById('cart-footer');
  const totalEl = document.getElementById('cart-total');
  if (cart.length === 0) {
    listEl.innerHTML = `<div style="text-align:center;padding:60px 20px;color:var(--text-muted)"><div style="font-size:56px;opacity:.3;margin-bottom:12px">🛒</div><p>السلة فارغة</p></div>`;
    footerEl.style.display = 'none'; return;
  }
  listEl.innerHTML = cart.map(item => `
    <div style="display:flex;gap:14px;padding:16px 0;border-bottom:1px solid rgba(255,255,255,.05)">
      <div style="width:52px;height:52px;border-radius:10px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0">${item.icon||'🎮'}</div>
      <div style="flex:1"><div style="font-size:14px;font-weight:600;margin-bottom:4px">${item.title}</div><div style="font-size:12px;color:var(--text-muted)">${item.game||''}</div></div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
        <span style="font-size:16px;font-weight:800;color:var(--gold)">${(item.price*(item.qty||1)).toFixed(0)} SAR</span>
        <button onclick="removeFromCart(${item.id});renderCartSidebar()" style="background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:16px">🗑</button>
      </div>
    </div>`).join('');
  totalEl.textContent = `${getCartTotal().toFixed(0)} SAR`;
  footerEl.style.display = 'block';
}
</script>
</body>
</html>
