<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>تفاصيل المنتج — Lgrinta</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&family=Bebas+Neue&display=swap" rel="stylesheet"/>
  <style>
    :root{
      --gold:#D4AF37;--gold-dim:rgba(212,175,55,0.12);
      --bg:#05050a;--bg2:#080810;
      --surface:#111120;--surface2:#181828;
      --border:rgba(212,175,55,0.15);--border2:rgba(255,255,255,0.06);
      --text:#eeeef5;--text-muted:#7878a0;--text-dim:#404060;
      --red:#ff3b5c;--green:#00e676;
      --radius:12px;--radius-lg:18px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:90px;}

    /* NAV */
    nav{position:fixed;top:0;left:0;right:0;z-index:100;height:60px;padding:0 16px;display:flex;align-items:center;justify-content:space-between;background:rgba(5,5,10,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}
    .nav-logo{display:flex;align-items:center;gap:8px;text-decoration:none;}
    .nav-logo img{height:36px;width:36px;object-fit:contain;filter:drop-shadow(0 2px 8px rgba(212,175,55,.4));}
    .nav-logo span{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:3px;color:var(--gold);}
    .nav-actions{display:flex;align-items:center;gap:8px;}
    .nav-back{display:flex;align-items:center;gap:6px;color:var(--text-muted);text-decoration:none;font-size:13px;font-weight:600;background:var(--surface2);border:1px solid var(--border2);padding:8px 14px;border-radius:10px;}
    .nav-back svg{width:14px;height:14px;}
    .nav-cart-btn{position:relative;display:flex;align-items:center;gap:5px;background:var(--surface2);border:1px solid var(--border2);color:var(--text);padding:8px 12px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;text-decoration:none;}
    .nav-cart-btn svg{width:15px;height:15px;}
    #cart-badge{position:absolute;top:-6px;right:-6px;background:var(--gold);color:#000;width:18px;height:18px;border-radius:50%;font-size:10px;font-weight:900;display:none;align-items:center;justify-content:center;}

    /* PAGE */
    .page-wrap{padding:76px 16px 24px;}

    /* BREADCRUMB */
    .breadcrumb{display:flex;align-items:center;gap:6px;margin-bottom:20px;font-size:12px;color:var(--text-muted);overflow-x:auto;white-space:nowrap;scrollbar-width:none;}
    .breadcrumb::-webkit-scrollbar{display:none;}
    .breadcrumb a{color:var(--text-muted);text-decoration:none;}
    .breadcrumb span{color:var(--text-dim);}

    /* SPINNER */
    .spinner-wrap{display:flex;justify-content:center;padding:80px 20px;}
    .spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* ERROR */
    .error-wrap{text-align:center;padding:80px 20px;}
    .error-wrap h3{font-size:18px;color:var(--text-muted);margin-bottom:12px;}
    .error-wrap a{color:var(--gold);text-decoration:none;}

    /* PRODUCT VISUAL */
    .product-img-box{
      width:100%;aspect-ratio:16/9;border-radius:var(--radius-lg);
      overflow:hidden;margin-bottom:20px;
      background:var(--surface);border:1px solid var(--border2);
      display:flex;align-items:center;justify-content:center;position:relative;
    }
    .product-img-box img{width:100%;height:100%;object-fit:cover;}
    .product-img-box .img-placeholder{
      width:100%;height:100%;display:flex;align-items:center;justify-content:center;
    }
    .product-img-box .img-placeholder svg{width:56px;height:56px;color:var(--gold);opacity:.4;}
    .img-ps{background:linear-gradient(135deg,#000d2e,#0040c0);}
    .img-xbox{background:linear-gradient(135deg,#001400,#107000);}
    .img-steam{background:linear-gradient(135deg,#0a1422,#1b3a5c);}
    .img-pubg{background:linear-gradient(135deg,#1a0e00,#8B5000);}
    .img-free{background:linear-gradient(135deg,#0e0018,#4a0090);}
    .img-social{background:linear-gradient(135deg,#050510,#0a0a30);}
    .img-itunes{background:linear-gradient(135deg,#1a0000,#8B0010);}
    .img-google{background:linear-gradient(135deg,#000a1a,#00287a);}
    .img-default{background:linear-gradient(135deg,#0e0e1a,#1a1a2e);}

    /* BADGES ROW */
    .badges-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;}
    .badge{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:100px;font-size:11px;font-weight:700;}
    .badge svg{width:12px;height:12px;}
    .badge-gold{background:var(--gold-dim);border:1px solid var(--border);color:var(--gold);}
    .badge-red{background:rgba(255,59,92,.1);border:1px solid rgba(255,59,92,.25);color:var(--red);}
    .badge-green{background:rgba(0,230,118,.1);border:1px solid rgba(0,230,118,.25);color:var(--green);}
    .badge-neutral{background:var(--surface2);border:1px solid var(--border2);color:var(--text-muted);}

    /* PRODUCT INFO */
    .product-game-label{font-size:11px;color:var(--gold);font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;}
    .product-title-h{font-family:'Bebas Neue',sans-serif;font-size:clamp(28px,7vw,42px);letter-spacing:1px;color:var(--text);line-height:1.05;margin-bottom:16px;}

    /* PRICE CARD */
    .price-card{
      display:flex;align-items:center;gap:14px;
      background:var(--surface);border:1px solid var(--border);
      border-radius:var(--radius-lg);padding:16px 20px;margin-bottom:18px;
    }
    .price-main{font-size:30px;font-weight:900;color:var(--gold);}
    .price-curr{font-size:14px;font-weight:500;}
    .price-old{font-size:15px;color:var(--text-dim);text-decoration:line-through;}
    .price-save{background:rgba(255,59,92,.12);border:1px solid rgba(255,59,92,.25);color:var(--red);padding:4px 10px;border-radius:6px;font-size:12px;font-weight:800;margin-right:auto;}

    /* META GRID */
    .meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px;}
    .meta-item{background:var(--surface2);border:1px solid var(--border2);border-radius:12px;padding:12px;}
    .meta-label{font-size:10px;color:var(--text-dim);margin-bottom:3px;letter-spacing:.5px;}
    .meta-value{font-size:13px;font-weight:700;}

    /* DESCRIPTION */
    .desc-card{background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius-lg);padding:18px;margin-bottom:20px;}
    .desc-card h4{font-size:13px;font-weight:800;color:var(--gold);margin-bottom:10px;display:flex;align-items:center;gap:6px;}
    .desc-card h4 svg{width:14px;height:14px;}
    .desc-card p{font-size:14px;color:var(--text-muted);line-height:1.8;}
    .desc-card ul{padding-right:18px;margin-top:10px;}
    .desc-card li{font-size:13px;color:var(--text-muted);margin-bottom:6px;display:flex;align-items:center;gap:6px;}
    .desc-card li svg{width:12px;height:12px;color:var(--green);flex-shrink:0;}

    /* QUICK ORDER FORM */
    .form-card{background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius-lg);padding:20px;margin-bottom:20px;}
    .form-card-title{font-size:14px;font-weight:800;color:var(--gold);margin-bottom:18px;display:flex;align-items:center;gap:8px;}
    .form-card-title svg{width:15px;height:15px;}
    .form-group{margin-bottom:14px;}
    .form-label{font-size:11px;font-weight:700;color:var(--text-muted);letter-spacing:.5px;margin-bottom:7px;display:block;}
    .form-input,.form-select,.form-textarea{width:100%;background:var(--surface2);border:1px solid var(--border2);color:var(--text);border-radius:10px;padding:12px 14px;font-family:'Tajawal',sans-serif;font-size:16px;outline:none;transition:border-color .2s;-webkit-appearance:none;}
    .form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--gold);}
    .form-input::placeholder{color:var(--text-dim);}
    .form-select option{background:var(--surface2);}
    .form-textarea{resize:vertical;min-height:72px;}
    .btn-submit-form{width:100%;background:linear-gradient(135deg,var(--gold),#b8960c);color:#000;border:none;padding:14px;border-radius:12px;font-size:16px;font-weight:800;cursor:pointer;font-family:'Tajawal',sans-serif;transition:all .2s;}
    .btn-submit-form:disabled{opacity:.6;cursor:not-allowed;}
    .success-box{display:none;text-align:center;padding:20px;background:rgba(0,230,118,.08);border:1px solid rgba(0,230,118,.25);border-radius:12px;margin-top:12px;}
    .success-box.show{display:block;}
    .success-box h4{color:var(--green);font-size:15px;font-weight:800;margin-bottom:6px;}
    .success-box p{font-size:13px;color:var(--text-muted);}

    /* RELATED */
    .related-section{margin-top:40px;}
    .section-eyebrow{font-size:11px;letter-spacing:2px;color:var(--gold);font-weight:700;margin-bottom:6px;}
    .section-heading{font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:1px;margin-bottom:8px;}
    .section-divider{width:40px;height:2px;background:linear-gradient(90deg,var(--gold),transparent);border-radius:2px;margin-bottom:18px;}
    .related-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;}

    /* PRODUCT CARD (for related) */
    .product-card{background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius-lg);overflow:hidden;cursor:pointer;transition:all .3s;-webkit-tap-highlight-color:transparent;}
    .product-card:active{transform:scale(.97);}
    .p-img-wrap{aspect-ratio:4/3;overflow:hidden;position:relative;}
    .p-img{width:100%;height:100%;display:flex;align-items:center;justify-content:center;}
    .p-img img{width:100%;height:100%;object-fit:cover;}
    .p-img svg{width:36px;height:36px;color:var(--gold);opacity:.5;}
    .p-badge{position:absolute;top:8px;right:8px;background:linear-gradient(135deg,var(--gold),#b8960c);color:#000;font-size:9px;font-weight:800;padding:3px 8px;border-radius:100px;}
    .p-info{padding:12px;}
    .p-game{font-size:10px;color:var(--gold);font-weight:700;text-transform:uppercase;margin-bottom:4px;}
    .p-title{font-size:13px;font-weight:700;margin-bottom:8px;line-height:1.3;}
    .p-price{font-size:15px;font-weight:900;color:var(--gold);}

    /* STICKY BOTTOM ACTIONS */
    .sticky-actions{
      position:fixed;bottom:0;left:0;right:0;z-index:100;
      background:rgba(5,5,10,.96);backdrop-filter:blur(20px);
      border-top:1px solid var(--border);
      padding:12px 16px;
      display:flex;gap:10px;
    }
    .btn-buy{
      flex:1;background:linear-gradient(135deg,var(--gold),#b8960c);
      color:#000;border:none;padding:14px 16px;border-radius:14px;
      font-size:15px;font-weight:800;cursor:pointer;
      display:flex;align-items:center;justify-content:center;gap:8px;
      font-family:'Tajawal',sans-serif;transition:all .2s;
    }
    .btn-buy svg{width:16px;height:16px;}
    .btn-wa{
      background:#25D366;color:#fff;border:none;
      width:52px;height:52px;border-radius:14px;
      display:flex;align-items:center;justify-content:center;
      cursor:pointer;text-decoration:none;flex-shrink:0;
    }
    .btn-wa svg{width:22px;height:22px;}
    .btn-cart-sticky{
      background:var(--surface2);color:var(--text);
      border:1px solid var(--border2);
      width:52px;height:52px;border-radius:14px;
      display:flex;align-items:center;justify-content:center;
      cursor:pointer;flex-shrink:0;
    }
    .btn-cart-sticky svg{width:18px;height:18px;}

    /* CART SIDEBAR */
    .cart-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:300;opacity:0;pointer-events:none;transition:opacity .3s;backdrop-filter:blur(4px);}
    .cart-overlay.open{opacity:1;pointer-events:all;}
    .cart-sidebar{position:fixed;bottom:0;left:0;right:0;max-height:90svh;background:var(--bg2);border-top:1px solid var(--border);border-radius:24px 24px 0 0;z-index:301;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);}
    .cart-overlay.open .cart-sidebar{transform:translateY(0);}
    .cart-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 0;}
    .cart-header{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
    .cart-header-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;color:var(--gold);}
    .btn-close-cart{background:var(--surface2);border:1px solid var(--border2);color:var(--text);width:32px;height:32px;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
    .btn-close-cart svg{width:14px;height:14px;}
    .cart-items{flex:1;overflow-y:auto;padding:14px 20px;}
    .cart-item{display:flex;gap:12px;padding:14px 0;border-bottom:1px solid rgba(255,255,255,.04);}
    .c-icon{width:46px;height:46px;border-radius:10px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;}
    .c-icon img{width:100%;height:100%;object-fit:cover;}
    .c-icon svg{width:20px;height:20px;color:var(--gold);}
    .c-info{flex:1;min-width:0;}
    .c-name{font-size:13px;font-weight:700;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .c-sub{font-size:11px;color:var(--text-muted);}
    .c-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px;}
    .c-price{font-size:14px;font-weight:900;color:var(--gold);white-space:nowrap;}
    .btn-rm{background:none;border:none;color:var(--text-dim);cursor:pointer;padding:2px;}
    .btn-rm svg{width:15px;height:15px;}
    .btn-rm:hover{color:var(--red);}
    .cart-empty-msg{text-align:center;padding:48px 20px;color:var(--text-muted);}
    .cart-empty-msg svg{width:40px;height:40px;margin:0 auto 12px;opacity:.2;}
    .cart-footer{padding:14px 20px;border-top:1px solid var(--border);}
    .cart-total-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
    .cart-total-label{font-size:14px;color:var(--text-muted);}
    .cart-total-value{font-size:22px;font-weight:900;color:var(--gold);}
    .btn-checkout{width:100%;background:linear-gradient(135deg,var(--gold),#b8960c);color:#000;border:none;padding:14px;border-radius:14px;font-size:15px;font-weight:800;cursor:pointer;font-family:'Tajawal',sans-serif;}

    @media(min-width:768px){
      nav{height:70px;padding:0 40px;}
      .page-wrap{max-width:1100px;margin:0 auto;padding:90px 40px 80px;}
      .product-layout{display:grid;grid-template-columns:1fr 1.1fr;gap:48px;align-items:start;}
      .product-visual{position:sticky;top:90px;}
      .product-img-box{aspect-ratio:1;}
      .sticky-actions{position:static;background:none;backdrop-filter:none;border:none;padding:0;flex-wrap:wrap;}
      .btn-buy{font-size:16px;}
      .btn-wa,.btn-cart-sticky{width:auto;padding:14px 20px;}
      .related-grid{grid-template-columns:repeat(auto-fill,minmax(200px,1fr));}
      .cart-sidebar{top:0;bottom:auto;left:auto;right:0;width:400px;max-height:100vh;border-radius:0;border-top:none;border-left:1px solid var(--border);transform:translateX(100%);}
      .cart-overlay.open .cart-sidebar{transform:translateX(0);}
      .cart-handle{display:none;}
      body{padding-bottom:0;}
    }
  </style>
</head>
<body>

<!-- NAV -->
<nav>
  <a href="index.html" class="nav-logo">
    <img src="img.png" alt="Lgrinta"/>
    <span>LGRINTA</span>
  </a>
  <div class="nav-actions">
    <a href="index.html" class="nav-back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
      المتجر
    </a>
    <a href="#" class="nav-cart-btn" onclick="toggleCart();return false;">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
      <span id="cart-badge">0</span>
    </a>
  </div>
</nav>

<!-- PAGE -->
<div class="page-wrap">
  <div class="breadcrumb">
    <a href="index.html">الرئيسية</a>
    <span>›</span>
    <a href="index.html#products">المنتجات</a>
    <span>›</span>
    <span id="breadcrumb-title">جاري التحميل...</span>
  </div>
  <div id="product-content">
    <div class="spinner-wrap"><div class="spinner"></div></div>
  </div>
</div>

<!-- CART -->
<div class="cart-overlay" id="cart-overlay" onclick="toggleCart()">
  <div class="cart-sidebar" onclick="event.stopPropagation()">
    <div class="cart-handle"></div>
    <div class="cart-header">
      <span class="cart-header-title">السلة</span>
      <button class="btn-close-cart" onclick="toggleCart()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="cart-items" id="cart-list"></div>
    <div id="cart-foot" style="display:none" class="cart-footer">
      <div class="cart-total-row">
        <span class="cart-total-label">الإجمالي</span>
        <span class="cart-total-value" id="cart-total-val">0 د.ت</span>
      </div>
      <button class="btn-checkout" onclick="location.href='checkout.html'">إتمام الطلب</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
// ── CONFIG ──────────────────────────────────────────
const SUPABASE_URL = 'https://xkkwoktedeyatabfqnpc.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhra3dva3RlZGV5YXRhYmZxbnBjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzMDM5NTUsImV4cCI6MjA5NDg3OTk1NX0.kzEzioDjV3ZPV13bsTQTA0i6QiwELolArdcpRgKwWYM';
const WA = '21696672771';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

// ── CART ─────────────────────────────────────────────
const CART_KEY = 'lgrinta_cart';
function getCart(){ return JSON.parse(localStorage.getItem(CART_KEY)||'[]'); }
function saveCart(c){ localStorage.setItem(CART_KEY,JSON.stringify(c)); updateBadge(); }
function addToCart(p){
  const cart = getCart();
  const ex = cart.find(i=>i.id===p.id);
  if(ex){ ex.qty=(ex.qty||1)+1; } else { cart.push({...p,qty:1}); }
  saveCart(cart);
  showToast('تمت الإضافة للسلة');
}
function removeFromCart(id){ saveCart(getCart().filter(i=>i.id!==id)); renderCart(); }
function cartTotal(){ return getCart().reduce((s,i)=>s+i.price*(i.qty||1),0); }
function updateBadge(){
  const n = getCart().reduce((s,i)=>s+(i.qty||1),0);
  const b = document.getElementById('cart-badge');
  if(b){ b.textContent=n; b.style.display=n>0?'flex':'none'; }
}
function showToast(msg){
  let t=document.getElementById('lgrinta-toast');
  if(!t){
    t=document.createElement('div');t.id='lgrinta-toast';
    t.style.cssText='position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#D4AF37;color:#000;padding:10px 20px;border-radius:12px;font-weight:800;font-size:14px;z-index:9999;transition:opacity .3s;white-space:nowrap;box-shadow:0 4px 20px rgba(212,175,55,.4)';
    document.body.appendChild(t);
  }
  t.textContent=msg; t.style.opacity='1';
  clearTimeout(t._t); t._t=setTimeout(()=>t.style.opacity='0',2000);
}

// ── CART SIDEBAR ─────────────────────────────────────
function toggleCart(){
  document.getElementById('cart-overlay').classList.toggle('open');
  renderCart();
}
function renderCart(){
  const cart=getCart();
  const list=document.getElementById('cart-list');
  const foot=document.getElementById('cart-foot');
  const tot=document.getElementById('cart-total-val');
  if(!list)return;
  if(!cart.length){
    list.innerHTML=`<div class="cart-empty-msg"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg><p>السلة فارغة</p></div>`;
    foot.style.display='none'; return;
  }
  list.innerHTML=cart.map(item=>`
    <div class="cart-item">
      <div class="c-icon">

async function submitQuickOrder(pid, ptitle, pprice) {
  const name  = document.getElementById('qf-name').value.trim();
  const phone = document.getElementById('qf-phone').value.trim();
  const gid   = document.getElementById('qf-id').value.trim();
  const pay   = document.getElementById('qf-pay').value;
  const notes = document.getElementById('qf-notes').value.trim();
  const btn   = document.getElementById('qf-submit');

  if (!name||!phone) { alert('يرجى ملء الاسم ورقم الواتساب'); return; }

  btn.disabled=true; btn.textContent='جاري الإرسال...';

  try {
    await db.from('orders').insert({
      product_id:pid, product_title:ptitle, amount:pprice,
      status:'pending', customer_name:name, customer_phone:phone,
      account_id:gid||null, payment_method:pay, notes:notes||null
    });
  } catch(e){ console.log(e); }

  const msg = `طلب جديد من Lgrinta\n\nالمنتج: ${ptitle}\nالسعر: ${pprice} د.ت\nالاسم: ${name}\nالجوال: ${phone}\nID: ${gid||'—'}\nالدفع: ${pay}\nملاحظات: ${notes||'—'}`;
  window.open(`https://wa.me/${WA}?text=${encodeURIComponent(msg)}`,'_blank');

  document.getElementById('quick-form').style.display='none';
  document.getElementById('qf-success').classList.add('show');
}

async function loadRelated(category, currentId) {
  const grid = document.getElementById('related-grid');
  if (!grid) return;
  const { data } = await db.from('products').select('*')
    .eq('category', category).eq('in_stock', true).neq('id', currentId).limit(4);

  if (!data||!data.length) {
    grid.innerHTML='<p style="color:var(--text-muted);font-size:14px;grid-column:1/-1">لا توجد منتجات مشابهة</p>';
    return;
  }
  grid.innerHTML = data.map(p=>`
    <div class="product-card" onclick="location.href='product.html?id=${p.id}'">
      <div class="p-img-wrap">
        <div class="p-img ${!p.image_url?p.img_class||'img-default':''}">
          ${p.image_url
            ?`<img src="${p.image_url}" alt="${p.title}" loading="lazy"/>`
            :getCatSVG(p.category)
          }
        </div>
        ${p.badge?`<span class="p-badge">${p.badge}</span>`:''}
      </div>
      <div class="p-info">
        <div class="p-game">${p.game||''}</div>
        <div class="p-title">${p.title}</div>
        <div class="p-price">${p.price} د.ت</div>
      </div>
    </div>`).join('');
}
