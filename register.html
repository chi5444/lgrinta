<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>إنشاء حساب — Lgrinta</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&family=Bebas+Neue&display=swap" rel="stylesheet"/>
  <style>
    :root{--gold:#D4AF37;--gold-dim:rgba(212,175,55,0.15);--bg:#070709;--bg2:#0d0d10;--surface:#15151e;--surface2:#1c1c28;--border:rgba(212,175,55,0.18);--text:#e8e8f0;--text-muted:#7a7a90;--red:#ff3b5c;}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--text);min-height:100svh;display:flex;align-items:center;justify-content:center;padding:20px;padding-top:40px;padding-bottom:40px;}
    body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 50% 70% at 50% 0%,rgba(212,175,55,.07),transparent 60%);pointer-events:none;}

    .auth-wrap{width:100%;max-width:440px;position:relative;z-index:1;}
    .auth-logo{font-family:'Bebas Neue',sans-serif;font-size:48px;letter-spacing:4px;color:var(--gold);text-align:center;display:block;text-shadow:0 0 40px rgba(212,175,55,.4);margin-bottom:8px;text-decoration:none;}
    .auth-tagline{text-align:center;color:var(--text-muted);font-size:14px;margin-bottom:40px;}
    .auth-card{background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:40px;}
    .auth-title{font-size:22px;font-weight:800;margin-bottom:6px;}
    .auth-subtitle{font-size:14px;color:var(--text-muted);margin-bottom:32px;}

    .form-group{margin-bottom:20px;}
    .form-label{font-size:12px;font-weight:700;color:var(--text-muted);letter-spacing:.5px;margin-bottom:8px;display:block;}
    .form-input{width:100%;background:var(--surface2);border:1px solid rgba(255,255,255,.07);color:var(--text);border-radius:12px;padding:13px 16px;font-family:'Tajawal',sans-serif;font-size:15px;outline:none;transition:border-color .2s;}
    .form-input:focus{border-color:var(--gold);}
    .form-input::placeholder{color:var(--text-muted);}

    .btn-auth{width:100%;background:linear-gradient(135deg,var(--gold),#b8960c);color:#000;border:none;padding:15px;border-radius:14px;font-size:16px;font-weight:800;cursor:pointer;font-family:'Tajawal',sans-serif;transition:all .2s;margin-top:8px;}
    .btn-auth:hover{transform:translateY(-1px);box-shadow:0 8px 30px rgba(212,175,55,.35);}
    .btn-auth:disabled{opacity:.6;cursor:not-allowed;transform:none;}

    .auth-switch{text-align:center;margin-top:24px;font-size:14px;color:var(--text-muted);}
    .auth-switch a{color:var(--gold);text-decoration:none;font-weight:700;}

    .error-msg{background:rgba(255,59,92,.1);border:1px solid rgba(255,59,92,.3);color:var(--red);padding:12px 16px;border-radius:10px;font-size:13px;margin-bottom:16px;display:none;}
    .error-msg.show{display:block;}
    .success-msg{background:rgba(37,211,102,.1);border:1px solid rgba(37,211,102,.3);color:#25D366;padding:12px 16px;border-radius:10px;font-size:13px;margin-bottom:16px;display:none;}
    .success-msg.show{display:block;}
    .back-home{display:flex;align-items:center;justify-content:center;gap:6px;color:var(--text-muted);text-decoration:none;font-size:13px;margin-bottom:24px;transition:color .2s;}
    .back-home:hover{color:var(--gold);}

    .perks{display:flex;flex-direction:column;gap:10px;margin-bottom:28px;}
    .perk{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--text-muted);}
    .perk-icon{font-size:16px;}
  </style>
</head>
<body>
<div class="auth-wrap">
  <a href="index.html" class="back-home">← العودة للمتجر</a>
  <a href="index.html" class="auth-logo">LGRINTA</a>
  <p class="auth-tagline">متجرك الرقمي الأول</p>

  <div class="auth-card">
    <h1 class="auth-title">إنشاء حساب جديد <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z"/><path d="m12 15-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z"/><path d="M9 12H4s.55-3.03 2-4c1.62-1.08 5 0 5 0"/><path d="M12 15v5s3.03-.55 4-2c1.08-1.62 0-5 0-5"/></svg></h1>
    <p class="auth-subtitle">انضم لآلاف المستخدمين الراضين</p>

    <div class="perks">
      <div class="perk"><span class="perk-icon"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg></span> تسليم فوري لجميع منتجاتك</div>
      <div class="perk"><span class="perk-icon"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16.5 9.4 7.55 4.24"/><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg></span> تتبع جميع طلباتك بسهولة</div>
      <div class="perk"><span class="perk-icon"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></span> حسابك محمي بالكامل</div>
    </div>

    <div class="error-msg" id="error-msg"></div>
    <div class="success-msg" id="success-msg"></div>

    <div class="form-group">
      <label class="form-label">الاسم</label>
      <input type="text" class="form-input" id="name" placeholder="اسمك الكريم"/>
    </div>
    <div class="form-group">
      <label class="form-label">البريد الإلكتروني</label>
      <input type="email" class="form-input" id="email" placeholder="example@email.com"/>
    </div>
    <div class="form-group">
      <label class="form-label">كلمة المرور</label>
      <input type="password" class="form-input" id="password" placeholder="8 أحرف على الأقل"/>
    </div>
    <div class="form-group">
      <label class="form-label">تأكيد كلمة المرور</label>
      <input type="password" class="form-input" id="confirm-password" placeholder="••••••••"/>
    </div>
    <button class="btn-auth" id="register-btn" onclick="handleRegister()">إنشاء الحساب</button>

    <div class="auth-switch">
      لديك حساب بالفعل؟ <a href="login.html">تسجيل الدخول</a>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/supabase.js"></script>
<script>
  (async () => {
    const { data: { session } } = await _supabase.auth.getSession();
    if (session) window.location.href = 'index.html';
  })();

  async function handleRegister() {
    const name = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const confirm = document.getElementById('confirm-password').value;
    const btn = document.getElementById('register-btn');
    const errEl = document.getElementById('error-msg');
    const sucEl = document.getElementById('success-msg');

    errEl.classList.remove('show'); sucEl.classList.remove('show');

    if (!name || !email || !password) { errEl.textContent = 'يرجى ملء جميع الحقول'; errEl.classList.add('show'); return; }
    if (password.length < 6) { errEl.textContent = 'كلمة المرور يجب أن تكون 6 أحرف على الأقل'; errEl.classList.add('show'); return; }
    if (password !== confirm) { errEl.textContent = 'كلمة المرور غير متطابقة'; errEl.classList.add('show'); return; }

    btn.disabled = true; btn.textContent = 'جاري إنشاء الحساب...';

    const { error } = await _supabase.auth.signUp({
      email, password,
      options: { data: { full_name: name }, emailRedirectTo: window.location.origin }
    });

    if (error) {
      errEl.textContent = error.message === 'User already registered' ? 'هذا البريد مسجل مسبقاً' : error.message;
      errEl.classList.add('show');
      btn.disabled = false; btn.textContent = 'إنشاء الحساب';
    } else {
      sucEl.textContent = '<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="14.5 17.5 3 6 3 3 6 3 17.5 14.5"/><line x1="13" y1="19" x2="19" y2="13"/><line x1="16" y1="16" x2="20" y2="20"/><line x1="19" y1="21" x2="21" y2="19"/></svg> تم إنشاء حسابك بنجاح! جاري تسجيل دخولك...';
      sucEl.classList.add('show');
      setTimeout(() => window.location.href = 'index.html', 1500);
    }
  }
</script>
</body>
</html>
